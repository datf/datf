name: Daily GitHub Traffic Sync

on:
  schedule:
    # Runs every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync-traffic:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Make data folder if it doesn't exist
        run: |
          mkdir -p data

      - name: Run scraper script
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python scripts/pull_stats.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --staged --quiet; then
            echo "No new data changes to commit today."
          else
            git commit -m "Automated daily traffic updates [skip ci]"
            git push
          fi
