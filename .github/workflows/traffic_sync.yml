name: Daily GitHub Traffic Sync

on:
  schedule:
    # Runs every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync-traffic:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run traffic script
        with:
          github_token: ${{ secrets.TRAFFIC_TOKEN }}
        uses: datf/traffic-data@main

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --staged --quiet; then
            echo "No new data changes to commit today."
          else
            git commit -m "Automated daily traffic updates [skip ci]"
            git push
          fi
